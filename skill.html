<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills | Portofolio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Boxicons untuk Ikon -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <header>
        <div class="navlist">
            <div class="logo">
                Porto<span>folio</span>
            </div>
            <div class="links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="skill.html" class="active">Skills</a>
                <a href="project.html">Projects</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
        <div id="menu-icon" class="hamburg">☰</div>

    <section id="skill" class="skill">
  <div class="main-text" data-aos="fade-up" data-aos-duration="1500">
    <span>My Skills</span>
    <h2>Technical Skills</h2>
  </div>

  <div class="skill-icons">

    <div class="skill-icon-item" data-aos="zoom-in" data-aos-delay="100">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg" alt="HTML">
      <p>HTML</p>
    </div>

    <div class="skill-icon-item" data-aos="zoom-in" data-aos-delay="200">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg" alt="CSS">
      <p>CSS</p>
    </div>

    <div class="skill-icon-item" data-aos="zoom-in" data-aos-delay="300">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg" alt="JavaScript">
      <p>JavaScript</p>
    </div>

    <div class="skill-icon-item" data-aos="zoom-in" data-aos-delay="400">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/php/php-original.svg" alt="PHP">
      <p>PHP</p>
    </div>

    <div class="skill-icon-item" data-aos="zoom-in" data-aos-delay="500">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/laravel/laravel-original.svg" alt="Laravel">
      <p>Laravel</p>
    </div>

    <div class="skill-icon-item" data-aos="zoom-in" data-aos-delay="600">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mysql/mysql-original.svg" alt="MySQL">
      <p>MySQL</p>
    </div>

    <div class="skill-icon-item" data-aos="zoom-in" data-aos-delay="700">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" alt="GitHub">
      <p>GitHub</p>
    </div>

    <div class="skill-icon-item" data-aos="zoom-in" data-aos-delay="800">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vscode/vscode-original.svg" alt="VS Code">
      <p>VS Code</p>
    </div>

  </div>
</section>

    <script src="porto.js"></script>
